# FONT FAMILY
# font_family "SauceCodePro NFM"
# bold_font        auto
# italic_font      auto
# bold_italic_font auto

# FONT SIZE
include font_size.conf

# BELL DISABLE
enable_audio_bell no

# BEGIN_KITTY_THEME
# Campbell
include current-theme.conf
# END_KITTY_THEME

# SHELL
shell_integration no-cursor

# CURSOR 
cursor_shape block

# LIGATURES
disable_ligatures always


# BEGIN_KITTY_FONTS
font_family      family='Iosevka Fixed' style='Extralight Extended'
bold_font        family='Iosevka Fixed' style=Extended
italic_font      family='Iosevka Fixed' style='Extralight Extended Italic'
bold_italic_font family='Iosevka Fixed' style='Extended Italic'
# END_KITTY_FONTS
