# FONT FAMILY
font_family      auto 
#family="SauceCodePro Nerd Font Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto

# FONT SIZE
font_size 15.0

# BELL DISABLE
enable_audio_bell no

# BEGIN_KITTY_THEME
# Campbell
include current-theme.conf
# END_KITTY_THEME

# SHELL
shell_integration no-cursor

# CURSOR 
cursor_shape block

# LIGATURES
disable_ligatures always
