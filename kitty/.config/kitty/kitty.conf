# FONT FAMILY
# font_family "SauceCodePro NFM"
# bold_font        auto
# italic_font      auto
# bold_italic_font auto

# FONT SIZE
font_size 18.0

# BELL DISABLE
enable_audio_bell no

# BEGIN_KITTY_THEME
# Campbell
include current-theme.conf
# END_KITTY_THEME

# SHELL
shell_integration no-cursor

# CURSOR 
cursor_shape block

# LIGATURES
disable_ligatures always


# BEGIN_KITTY_FONTS
font_family      family="FreeMono"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
